<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kalam.me - Apprenez une langue en parlant</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: linear-gradient(180deg, #F5F1E8 0%, #FAFAF8 100%); color: #1B5E39; min-height: 100vh; padding-bottom: 70px; }
    .app-header { position: fixed; top: 0; left: 0; right: 0; height: 56px; display: flex; justify-content: space-between; align-items: center; padding: 0 16px; background: white; border-bottom: 1px solid rgba(0,0,0,0.1); z-index: 1000; }
    .header-branding { display: flex; align-items: center; gap: 12px; flex: 1; }
    .medin-logo { display: flex; align-items: center; gap: 6px; font-size: 11px; font-weight: 600; color: #0F5A43; }
    .medin-logo img { height: 24px; width: auto; }
    .header-badge { background: linear-gradient(135deg, #D4AF37 0%, #DAA520 100%); color: #0F5A43; padding: 8px 16px; border-radius: 50px; font-weight: 700; font-size: 12px; }
    .lang-selector { display: flex; gap: 6px; margin-left: auto; }
    .lang-btn { padding: 7px 12px; border: 1.5px solid #ccc; background: white; color: #0F5A43; border-radius: 10px; cursor: pointer; font-size: 12px; font-weight: 700; }
    .lang-btn.active { background: #0F5A43; color: white; border-color: #0F5A43; }
    .container { max-width: 600px; margin: 0 auto; padding: 70px 20px 20px; min-height: 100vh; }
    .screen { display: none; }
    .screen.active { display: block; }
    .welcome-card { background: white; border-radius: 20px; padding: 30px 20px; margin-bottom: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.08); text-align: center; }
    .welcome-title { font-size: 24px; font-weight: 800; color: #0F5A43; margin-bottom: 10px; }
    .welcome-text { font-size: 16px; color: #666; line-height: 1.5; margin-bottom: 20px; }
    .features-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-top: 20px; }
    .feature-card { font-size: 32px; margin-bottom: 8px; }
    .feature-label { font-size: 12px; color: #666; font-weight: 600; }
    .btn-primary { width: 100%; padding: 16px; background: linear-gradient(135deg, #0F5A43 0%, #157A5B 100%); color: white; border: none; border-radius: 15px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 15px; }
    .lessons-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 10px; }
    .lesson-card { background: white; border-radius: 15px; padding: 16px; box-shadow: 0 3px 12px rgba(0,0,0,0.08); cursor: pointer; text-align: center; position: relative; }
    .lesson-emoji { font-size: 32px; margin-bottom: 8px; }
    .lesson-title { font-size: 13px; font-weight: 700; color: #0F5A43; }
    .lesson-done { position: absolute; top: 8px; right: 8px; font-size: 18px; }
    .oustaz-stage { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 500px; padding: 30px 20px; }
    .oustaz-title { font-size: 20px; color: #0F5A43; margin-bottom: 20px; font-weight: 700; }
    .character-wrapper { position: relative; width: 200px; height: 240px; margin-bottom: 30px; border-radius: 15px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .character-img { width: 100%; height: 100%; object-fit: contain; filter: drop-shadow(0 8px 16px rgba(0,0,0,0.15)); }
    .character-img.idle { animation: breathe 3.5s ease-in-out infinite; }
    @keyframes breathe { 0%, 100% { transform: scale(1) rotate(0deg); } 30% { transform: scale(1.015) rotate(-0.6deg); } 70% { transform: scale(1.01) rotate(0.6deg); } }
    .transcript-area { width: 100%; text-align: center; min-height: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; padding: 0 10px; margin-bottom: 20px; }
    .transcript-arabic { font-size: 20px; line-height: 1.6; color: #1B5E39; font-weight: 600; direction: rtl; }
    .transcript-french { font-size: 16px; line-height: 1.5; color: #999; }
    .voice-controls { text-align: center; margin: 20px 0; }
    .mic-big { width: 80px; height: 80px; border-radius: 50%; border: none; background: linear-gradient(135deg, #D4AF37 0%, #DAA520 100%); font-size: 36px; cursor: pointer; box-shadow: 0 6px 20px rgba(212,175,55,0.45); }
    .mic-big.recording { background: #FF6B6B; animation: pulse 1s infinite; }
    .mic-big.active-conv { box-shadow: 0 0 0 4px rgba(15,90,67,0.35), 0 6px 20px rgba(212,175,55,0.45); }
    .btn-replay.muted { background: #FF6B6B; color: white; border-color: #FF6B6B; }
    @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.08); } }
    .mic-hint { font-size: 12px; color: #999; margin-top: 10px; }
    .btn-replay { padding: 12px 24px; background: white; color: #0F5A43; border: 2px solid #0F5A43; border-radius: 12px; font-size: 14px; font-weight: 600; cursor: pointer; }
    .profile-header { text-align: center; margin-bottom: 30px; }
    .profile-avatar { width: 100px; height: 100px; border-radius: 50%; overflow: hidden; margin: 0 auto 15px; background: linear-gradient(135deg, #D4AF37 0%, #DAA520 100%); display: flex; align-items: center; justify-content: center; box-shadow: 0 6px 20px rgba(212,175,55,0.2); }
    .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .profile-name { font-size: 20px; font-weight: 700; color: #0F5A43; margin-bottom: 20px; }
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
    .stat-card { background: white; border-radius: 15px; padding: 20px; text-align: center; box-shadow: 0 3px 12px rgba(0,0,0,0.08); }
    .stat-value { font-size: 28px; font-weight: 800; color: #D4AF37; margin-bottom: 8px; }
    .stat-label { font-size: 12px; color: #999; font-weight: 600; }
    .progress-bar { width: 100%; height: 8px; background: rgba(0,0,0,0.1); border-radius: 10px; overflow: hidden; margin-bottom: 10px; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #0F5A43 0%, #157A5B 100%); width: 0%; transition: width 0.3s; }
    .progress-label { font-size: 12px; color: #999; text-align: center; }
    .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; height: 70px; background: white; border-top: 1px solid rgba(0,0,0,0.08); display: flex; justify-content: space-around; align-items: center; z-index: 999; }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; font-size: 28px; color: #ccc; padding-top: 8px; }
    .nav-item.active { color: #0F5A43; font-size: 32px; }
    .nav-item-label { font-size: 10px; margin-top: 4px; color: #ccc; font-weight: 600; }
    .nav-item.active .nav-item-label { color: #0F5A43; }
  </style>
</head>
<body>

<div class="app-header">
  <div class="header-branding">
    <div class="medin-logo">
      <span>by</span>
      <img src="logo-medin.png" alt="Médin'Immersion">
    </div>
  </div>
  <div class="header-badge">✨ Kalam.me ✨</div>
  <div class="lang-selector">
    <button class="lang-btn active" onclick="setLang('fr')">FR</button>
    <button class="lang-btn" onclick="setLang('en')">EN</button>
    <button class="lang-btn" onclick="setLang('ar')">AR</button>
  </div>
</div>

<div class="container">
  <div class="screen active" id="homeScreen">
    <div class="welcome-card">
      <div style="font-size: 80px; margin-bottom: 15px;">🎤</div>
      <h1 class="welcome-title" id="welcomeTitle">Bienvenue!</h1>
      <p class="welcome-text" id="welcomeText">L'apprentissage en action</p>
      <div class="features-grid">
        <div><div class="feature-card">🎤</div><div class="feature-label" id="f1">Parle</div></div>
        <div><div class="feature-card">📚</div><div class="feature-label" id="f2">Apprends</div></div>
        <div><div class="feature-card">🌍</div><div class="feature-label" id="f3">Progresse</div></div>
      </div>
      <button class="btn-primary" onclick="goToLessons()" id="startBtn">Commencer</button>
    </div>
  </div>

  <div class="screen" id="lessonsScreen">
    <h1 class="welcome-title" style="text-align: center; margin-bottom: 20px;" id="lessonsTitle">Leçons</h1>
    <div class="lessons-grid" id="lessonsGrid"></div>
  </div>

  <div class="screen" id="chatScreen">
    <div class="oustaz-stage">
      <h2 class="oustaz-title" id="chatTitle">Oustaz Abou Adam</h2>
      <div class="character-wrapper">
        <video id="oustazVideo" src="https://raw.githubusercontent.com/medinimmersion/Kalam.me-by-M-dinImmersion-/main/oustaz-speaking.mp4" class="character-img" muted playsinline loop autoplay></video>
      </div>
      <div class="transcript-area">
        <div class="transcript-arabic" id="arabicText">السلام عليكم</div>
        <div class="transcript-french" id="frenchText">Bonjour!</div>
      </div>
      <div class="voice-controls">
        <button class="mic-big" id="micBtn" onclick="toggleMicrophone()">🎤</button>
        <div class="mic-hint" id="micHint">Appuie et parle</div>
      </div>
      <div style="display:flex; gap:10px; flex-wrap:wrap; justify-content:center;">
        <button class="btn-replay" id="muteBtn" onclick="toggleMute()" style="display:none;">🎙️ Micro actif</button>
        <button class="btn-replay" onclick="replayOustaz()">🔊 Réécouter</button>
      </div>
    </div>
  </div>

  <div class="screen" id="profileScreen">
    <div class="profile-header">
      <div class="profile-avatar">
        <img src="oustaz.png" alt="Avatar">
      </div>
      <div class="profile-name" id="profileName">Mon Profil</div>
    </div>
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value" id="statLessons">0</div>
        <div class="stat-label" id="statLessonsLabel">Leçons</div>
      </div>
      <div class="stat-card">
        <div class="stat-value" id="statPhrases">0</div>
        <div class="stat-label" id="statPhrasesLabel">Phrases</div>
      </div>
    </div>
    <div style="padding: 0 15px;">
      <div style="margin-bottom: 10px; color: #0F5A43; font-weight: 700; font-size: 14px;" id="progressLabel">Progression</div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-label" id="progressText">0%</div>
    </div>
  </div>
</div>

<div class="nav-bar">
  <div class="nav-item active" onclick="switchScreen('homeScreen', 0)">🏠<div class="nav-item-label" id="navHome">Accueil</div></div>
  <div class="nav-item" onclick="switchScreen('lessonsScreen', 1)">📖<div class="nav-item-label" id="navLessons">Leçons</div></div>
  <div class="nav-item" onclick="switchScreen('chatScreen', 2)">💬<div class="nav-item-label" id="navChat">Chat</div></div>
  <div class="nav-item" onclick="switchScreen('profileScreen', 3)">👤<div class="nav-item-label" id="navProfile">Profil</div></div>
</div>

<script>
const lessons = [
  { emoji: '👋', title: 'Salutations' },
  { emoji: '👤', title: 'Présentation' },
  { emoji: '🔢', title: 'Nombres' },
  { emoji: '🍽️', title: 'Nourriture' },
  { emoji: '🎨', title: 'Couleurs' },
  { emoji: '👨‍👩‍👧', title: 'Famille' },
  { emoji: '📅', title: 'Les jours' },
  { emoji: '🕌', title: 'À la mosquée' }
];

const translations = {
  fr: { welcomeTitle: 'Bienvenue!', welcomeText: 'L\'apprentissage en action', f1: 'Parle', f2: 'Apprends', f3: 'Progresse', startBtn: 'Commencer', lessonsTitle: 'Leçons', chatTitle: 'Oustaz Abou Adam', micHint: 'Appuie et parle', profileName: 'Mon Profil', statLessonsLabel: 'Leçons', statPhrasesLabel: 'Phrases', progressLabel: 'Progression', navHome: 'Accueil', navLessons: 'Leçons', navChat: 'Chat', navProfile: 'Profil' },
  en: { welcomeTitle: 'Welcome!', welcomeText: 'Learning in action', f1: 'Speak', f2: 'Learn', f3: 'Progress', startBtn: 'Start', lessonsTitle: 'Lessons', chatTitle: 'Oustaz Abou Adam', micHint: 'Press and speak', profileName: 'My Profile', statLessonsLabel: 'Lessons', statPhrasesLabel: 'Phrases', progressLabel: 'Progress', navHome: 'Home', navLessons: 'Lessons', navChat: 'Chat', navProfile: 'Profile' },
  ar: { welcomeTitle: 'أهلا!', welcomeText: 'التعلم أثناء العمل', f1: 'تحدث', f2: 'تعلم', f3: 'تقدم', startBtn: 'ابدأ', lessonsTitle: 'الدروس', chatTitle: 'أستاذ أبو آدم', micHint: 'اضغط وتحدث', profileName: 'ملفي', statLessonsLabel: 'دروس', statPhrasesLabel: 'عبارات', progressLabel: 'التقدم', navHome: 'الرئيسية', navLessons: 'دروس', navChat: 'دردشة', navProfile: 'ملف' }
};

let currentLang = 'fr';
let progress = { lessons: [], phrases: 0 };
let isRecording = false;

function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('kalam_lang', lang);
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  updateUI();
}

function updateUI() {
  const t = translations[currentLang];
  document.getElementById('welcomeTitle').textContent = t.welcomeTitle;
  document.getElementById('welcomeText').textContent = t.welcomeText;
  document.getElementById('f1').textContent = t.f1;
  document.getElementById('f2').textContent = t.f2;
  document.getElementById('f3').textContent = t.f3;
  document.getElementById('startBtn').textContent = t.startBtn;
  document.getElementById('lessonsTitle').textContent = t.lessonsTitle;
  document.getElementById('chatTitle').textContent = t.chatTitle;
  document.getElementById('micHint').textContent = t.micHint;
  document.getElementById('profileName').textContent = t.profileName;
  document.getElementById('statLessonsLabel').textContent = t.statLessonsLabel;
  document.getElementById('statPhrasesLabel').textContent = t.statPhrasesLabel;
  document.getElementById('progressLabel').textContent = t.progressLabel;
  document.getElementById('navHome').textContent = t.navHome;
  document.getElementById('navLessons').textContent = t.navLessons;
  document.getElementById('navChat').textContent = t.navChat;
  document.getElementById('navProfile').textContent = t.navProfile;
}

function renderLessons() {
  const grid = document.getElementById('lessonsGrid');
  grid.innerHTML = lessons.map((l, i) => `
    <div class="lesson-card" onclick="selectLesson(${i})">
      <div class="lesson-emoji">${l.emoji}</div>
      <div class="lesson-title">${l.title}</div>
      ${progress.lessons.includes(i) ? '<div class="lesson-done">✓</div>' : ''}
    </div>
  `).join('');
}

function selectLesson(i) {
  if (!progress.lessons.includes(i)) {
    progress.lessons.push(i);
    saveProgress();
  }
  askOustaz(`Apprends-moi ${lessons[i].title.toLowerCase()}`);
  switchScreen('chatScreen', 2);
}

async function askOustaz(text) {
  document.getElementById('arabicText').textContent = '...';
  document.getElementById('frenchText').textContent = 'Attends...';
  try {
    const response = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent?key=AQ.Ab8RN6I_U7pAy2ZL6VY2f_nKHiawfWuoMjTbgdpT2rmF6IKsGA', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: 'Tu es Oustaz Abou Adam, professeur arabe salafi qui suit le Coran et la Sounnah selon la comprehension des Salafs. REGLES ABSOLUES: ne dis JAMAIS le mot Dieu, dis toujours Allah. Al-hamdou lillah se traduit Louange a Allah (jamais Dieu soit loue). Garde les termes islamiques en arabe: Allah, in shaa Allah, ma shaa Allah, barakAllahou fik, as-salamou alaykoum. Reponds en UNE phrase courte: arabe dabord, puis traduction francaise sur une nouvelle ligne. Question: ' + text }] }],
        generationConfig: { maxOutputTokens: 1024, thinkingConfig: { thinkingBudget: 0 } }
      })
    });
    const data = await response.json();
    // CORRECT: Gemini renvoie "candidates", pas "contents"
    let reply = null;
    if (data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts && data.candidates[0].content.parts[0]) {
      reply = data.candidates[0].content.parts[0].text;
    }
    if (!reply) {
      const errMsg = (data.error && data.error.message) ? data.error.message : 'Reponse vide';
      document.getElementById('arabicText').textContent = 'عفوا';
      document.getElementById('frenchText').textContent = errMsg.substring(0, 80);
      return;
    }
    const lines = reply.trim().split('\n').filter(function(l) { return l.trim(); });
    const arab = lines[0] || reply;
    const fren = lines[1] || '';
    document.getElementById('arabicText').textContent = arab;
    document.getElementById('frenchText').textContent = fren;
    speak(arab, fren);
  } catch(e) {
    document.getElementById('arabicText').textContent = 'عفوا';
    document.getElementById('frenchText').textContent = 'Erreur: ' + e.message;
  }
}

function onSpeechDone() {
  setOustazState('idle');
  if (typeof conversationActive !== 'undefined' && conversationActive && !isMuted) {
    scheduleListen(800);
  }
}

function setOustazState(state) {
  const video = document.getElementById('oustazVideo');
  if (!video) return;
  if (state === 'speaking') {
    video.classList.remove('idle');
    video.loop = true;
    video.play().catch(function(){});
  } else {
    video.pause();
    video.classList.add('idle');
  }
}

function speak(arab, fren) {
  window.speechSynthesis.cancel();
  setOustazState('speaking');
  const parts = [];
  if (arab && arab.trim()) parts.push({ text: arab, lang: 'ar-SA' });
  if (fren && fren.trim()) parts.push({ text: fren, lang: 'fr-FR' });
  if (!parts.length) { setOustazState('idle'); return; }
  let i = 0;
  function next() {
    if (i >= parts.length) { onSpeechDone(); return; }
    const p = parts[i++];
    const u = new SpeechSynthesisUtterance(p.text);
    u.lang = p.lang;
    u.rate = 0.9;
    u.onend = next;
    u.onerror = next;
    window.speechSynthesis.speak(u);
  }
  next();
  // Anti-coupure Chrome: garde la synthese vocale active
  if (window._kalamKeepAlive) clearInterval(window._kalamKeepAlive);
  window._kalamKeepAlive = setInterval(function() {
    if (!window.speechSynthesis.speaking) {
      clearInterval(window._kalamKeepAlive);
      onSpeechDone();
    } else {
      window.speechSynthesis.resume();
    }
  }, 5000);
}

function replayOustaz() {
  const arab = document.getElementById('arabicText').textContent;
  const fren = document.getElementById('frenchText').textContent;
  speak(arab, fren);
}

let conversationActive = false;
let isMuted = false;
let isListening = false;
let recognition = null;

function toggleMicrophone() {
  if (conversationActive) { stopConversation(); } else { startConversation(); }
}

function startConversation() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { alert('Chrome requis'); return; }
  conversationActive = true;
  isMuted = false;
  document.getElementById('micBtn').classList.add('active-conv');
  document.getElementById('micBtn').textContent = '⏹';
  document.getElementById('micHint').textContent = 'Conversation active — parle!';
  const mb = document.getElementById('muteBtn');
  mb.style.display = 'inline-block';
  mb.textContent = '🎙️ Micro actif';
  mb.classList.remove('muted');
  startListening();
}

function stopConversation() {
  conversationActive = false;
  isListening = false;
  if (recognition) { recognition.onend = null; try { recognition.stop(); } catch(e) {} }
  window.speechSynthesis.cancel();
  if (window._restartTimer) clearTimeout(window._restartTimer);
  const btn = document.getElementById('micBtn');
  btn.classList.remove('active-conv');
  btn.classList.remove('recording');
  btn.textContent = '🎤';
  document.getElementById('micHint').textContent = 'Appuie et parle';
  document.getElementById('muteBtn').style.display = 'none';
  setOustazState('idle');
}

function toggleMute() {
  isMuted = !isMuted;
  const mb = document.getElementById('muteBtn');
  if (isMuted) {
    mb.textContent = '🔇 Micro coupé';
    mb.classList.add('muted');
    document.getElementById('micHint').textContent = 'Micro coupé — Oustaz parle sans gêne';
    isListening = false;
    if (window._restartTimer) clearTimeout(window._restartTimer);
    if (recognition) { recognition.onend = null; try { recognition.stop(); } catch(e) {} }
    document.getElementById('micBtn').classList.remove('recording');
  } else {
    mb.textContent = '🎙️ Micro actif';
    mb.classList.remove('muted');
    document.getElementById('micHint').textContent = 'Conversation active — parle!';
    scheduleListen(400);
  }
}

function scheduleListen(delay) {
  if (window._restartTimer) clearTimeout(window._restartTimer);
  window._restartTimer = setTimeout(function() {
    startListening();
  }, delay);
}

function startListening() {
  if (!conversationActive || isMuted || isListening) return;
  if (window.speechSynthesis.speaking) { scheduleListen(1000); return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = 'ar-SA';
  recognition.continuous = true;
  recognition.interimResults = false;
  isListening = true;
  recognition.onstart = function() {
    document.getElementById('micBtn').classList.add('recording');
    setOustazState('idle');
  };
  recognition.onresult = function(e) {
    const last = e.results[e.results.length - 1];
    const said = last[0].transcript.trim();
    if (!said) return;
    isListening = false;
    try { recognition.stop(); } catch(err) {}
    progress.phrases++;
    saveProgress();
    askOustaz(said);
  };
  recognition.onend = function() {
    isListening = false;
    document.getElementById('micBtn').classList.remove('recording');
    if (conversationActive && !isMuted && !window.speechSynthesis.speaking) {
      scheduleListen(1500);
    }
  };
  recognition.onerror = function(e) {
    isListening = false;
  };
  try { recognition.start(); } catch(e) { isListening = false; }
}

function switchScreen(screenId, navIndex) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(screenId).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.querySelectorAll('.nav-item')[navIndex].classList.add('active');
}

function goToLessons() {
  switchScreen('lessonsScreen', 1);
}

function saveProgress() {
  localStorage.setItem('kalam_progress', JSON.stringify(progress));
  updateStats();
}

function loadProgress() {
  const saved = localStorage.getItem('kalam_progress');
  if (saved) progress = JSON.parse(saved);
}

function updateStats() {
  document.getElementById('statLessons').textContent = progress.lessons.length;
  document.getElementById('statPhrases').textContent = progress.phrases;
  const pct = Math.round((progress.lessons.length / lessons.length) * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = pct + '%';
}

loadProgress();
renderLessons();
updateUI();
currentLang = localStorage.getItem('kalam_lang') || 'fr';
setOustazState('idle');
</script>

</body>
</html>
